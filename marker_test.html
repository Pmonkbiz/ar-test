<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tokoprint WebAR Test</title>
    
    <!-- 🌟 最も安定して動作するバージョンの組み合わせに変更 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #scanning-overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; font-size: 20px; z-index: 10;
            pointer-events: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="scanning-overlay">TokoMarkerにかざしてください...</div>

    <!-- 🌟 安定版の記述形式に最適化 -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="myModel" src="./test02.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            <a-gltf-model 
                src="#myModel" 
                position="0 0 0" 
                rotation="0 0 0" 
                scale="1 1 1">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        const target = document.querySelector('#ar-target');
        const overlay = document.querySelector('#scanning-overlay');
        
        target.addEventListener("targetFound", event => {
            overlay.classList.add('hidden');
        });
        target.addEventListener("targetLost", event => {
            overlay.classList.remove('hidden');
        });
    </script>

</body>
</html>
